<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 800" font-family="'Segoe UI', 'Hiragino Sans', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="input" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="storage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="recall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="consolidate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="sub-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="sub-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="sub-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ===== 入力 ===== -->
  <rect x="280" y="10" width="200" height="50" rx="10" fill="url(#input)" filter="url(#shadow)"/>
  <text x="380" y="41" text-anchor="middle" fill="white" font-size="15" font-weight="bold">会話</text>

  <!-- 分岐の線 -->
  <line x1="330" y1="60" x2="190" y2="90" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="430" y1="60" x2="570" y2="90" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="230" y="72" fill="#6b7280" font-size="10">自動</text>
  <text x="500" y="72" fill="#6b7280" font-size="10">手動</text>

  <!-- keyword-buffer -->
  <rect x="100" y="90" width="180" height="45" rx="8" fill="url(#sub-purple)" filter="url(#shadow-sm)"/>
  <text x="190" y="111" text-anchor="middle" fill="white" font-size="12" font-weight="600">keyword-buffer</text>
  <text x="190" y="126" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">(hook)</text>

  <!-- diary -->
  <rect x="480" y="90" width="180" height="45" rx="8" fill="url(#sub-purple)" filter="url(#shadow-sm)"/>
  <text x="570" y="111" text-anchor="middle" fill="white" font-size="12" font-weight="600">diary (+steps)</text>
  <text x="570" y="126" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">手動保存</text>

  <!-- crystallize ラベル -->
  <text x="190" y="155" text-anchor="middle" fill="#6b7280" font-size="10">crystallize</text>
  <line x1="190" y1="135" x2="190" y2="160" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- diary → storage -->
  <line x1="570" y1="135" x2="570" y2="160" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="190" y1="160" x2="190" y2="195" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="570" y1="160" x2="570" y2="195" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- ===== ストレージ ===== -->
  <rect x="60" y="175" width="640" height="170" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="380" y="196" text-anchor="middle" fill="#059669" font-size="11" font-weight="600">ストレージ</text>

  <!-- memory.db -->
  <rect x="280" y="205" width="200" height="50" rx="10" fill="url(#storage)" filter="url(#shadow)"/>
  <text x="380" y="228" text-anchor="middle" fill="white" font-size="13" font-weight="bold">memory.db</text>
  <text x="380" y="245" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">SQLite</text>

  <!-- memories -->
  <rect x="110" y="280" width="200" height="50" rx="8" fill="url(#sub-green)" filter="url(#shadow-sm)"/>
  <text x="210" y="302" text-anchor="middle" fill="white" font-size="12" font-weight="600">memories</text>
  <text x="210" y="320" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">日記 + 感情 + freshness</text>

  <!-- verb_chains -->
  <rect x="450" y="280" width="200" height="50" rx="8" fill="url(#sub-green)" filter="url(#shadow-sm)"/>
  <text x="550" y="302" text-anchor="middle" fill="white" font-size="12" font-weight="600">verb_chains</text>
  <text x="550" y="320" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">動詞→動詞→動詞 + 名詞</text>

  <!-- db → memories / verb_chains -->
  <line x1="330" y1="255" x2="250" y2="280" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="430" y1="255" x2="510" y2="280" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- ===== 想起 ===== -->
  <rect x="60" y="375" width="640" height="80" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="380" y="393" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="600">想起</text>

  <!-- memories → recall -->
  <line x1="170" y1="330" x2="140" y2="400" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="250" y1="330" x2="340" y2="400" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="550" y1="330" x2="590" y2="400" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- recall -->
  <rect x="75" y="400" width="200" height="40" rx="8" fill="url(#recall)" filter="url(#shadow-sm)"/>
  <text x="175" y="417" text-anchor="middle" fill="white" font-size="11" font-weight="600">recall</text>
  <text x="175" y="433" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="9">literal / analogy / surface</text>

  <!-- recall_divergent -->
  <rect x="290" y="400" width="180" height="40" rx="8" fill="url(#recall)" filter="url(#shadow-sm)"/>
  <text x="380" y="417" text-anchor="middle" fill="white" font-size="11" font-weight="600">recall_divergent</text>
  <text x="380" y="433" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="9">発散的想起</text>

  <!-- recall_experience -->
  <rect x="485" y="400" width="200" height="40" rx="8" fill="url(#recall)" filter="url(#shadow-sm)"/>
  <text x="585" y="417" text-anchor="middle" fill="white" font-size="11" font-weight="600">recall_experience</text>
  <text x="585" y="433" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="9">literal / analogy / surface</text>

  <!-- ===== 定期統合 ===== -->
  <!-- 点線 recall → consolidate -->
  <line x1="175" y1="455" x2="175" y2="495" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="380" y1="455" x2="380" y2="495" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="585" y1="455" x2="585" y2="495" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="380" y="483" text-anchor="middle" fill="#9ca3af" font-size="9">定期実行</text>

  <rect x="60" y="495" width="640" height="265" rx="16" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="380" y="516" text-anchor="middle" fill="#d97706" font-size="11" font-weight="600">consolidate（統合）</text>

  <!-- 4ステップ縦並び -->
  <!-- 1. freshness減衰 -->
  <rect x="500" y="525" width="170" height="36" rx="8" fill="url(#consolidate)" filter="url(#shadow-sm)"/>
  <text x="585" y="548" text-anchor="middle" fill="white" font-size="12" font-weight="600">1. freshness 減衰</text>

  <line x1="585" y1="561" x2="585" y2="575" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="585,580 580,573 590,573" fill="#d1d5db"/>

  <!-- 2. 合成記憶 -->
  <rect x="500" y="580" width="170" height="36" rx="8" fill="url(#consolidate)" filter="url(#shadow-sm)"/>
  <text x="585" y="603" text-anchor="middle" fill="white" font-size="12" font-weight="600">2. 合成記憶</text>

  <line x1="585" y1="616" x2="585" y2="630" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="585,635 580,628 590,628" fill="#d1d5db"/>

  <!-- 3. バウンダリー -->
  <rect x="500" y="635" width="170" height="36" rx="8" fill="url(#consolidate)" filter="url(#shadow-sm)"/>
  <text x="585" y="658" text-anchor="middle" fill="white" font-size="12" font-weight="600">3. バウンダリー</text>

  <line x1="585" y1="671" x2="585" y2="685" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="585,690 580,683 590,683" fill="#d1d5db"/>

  <!-- 4. 交差検出 -->
  <rect x="500" y="690" width="170" height="36" rx="8" fill="url(#consolidate)" filter="url(#shadow-sm)"/>
  <text x="585" y="713" text-anchor="middle" fill="white" font-size="12" font-weight="600">4. 交差検出</text>

  <!-- 合成記憶レイヤー（左側サブセクション） -->
  <rect x="80" y="535" width="390" height="80" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="275" y="552" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">合成記憶レイヤー</text>

  <rect x="95" y="560" width="100" height="32" rx="6" fill="url(#sub-amber)" filter="url(#shadow-sm)"/>
  <text x="145" y="580" text-anchor="middle" fill="white" font-size="10" font-weight="600">L0: 個別</text>

  <!-- arrow -->
  <line x1="195" y1="576" x2="215" y2="576" stroke="#92400e" stroke-width="1.5"/>
  <polygon points="220,576 214,572 214,580" fill="#92400e"/>
  <text x="207" y="570" text-anchor="middle" fill="#92400e" font-size="8">0.75</text>

  <rect x="225" y="560" width="100" height="32" rx="6" fill="url(#sub-amber)" filter="url(#shadow-sm)"/>
  <text x="275" y="580" text-anchor="middle" fill="white" font-size="10" font-weight="600">L1: 類似</text>

  <!-- arrow -->
  <line x1="325" y1="576" x2="345" y2="576" stroke="#92400e" stroke-width="1.5"/>
  <polygon points="350,576 344,572 344,580" fill="#92400e"/>
  <text x="337" y="570" text-anchor="middle" fill="#92400e" font-size="8">0.55</text>

  <rect x="355" y="560" width="100" height="32" rx="6" fill="url(#sub-amber)" filter="url(#shadow-sm)"/>
  <text x="405" y="580" text-anchor="middle" fill="white" font-size="10" font-weight="600">L2: 上位</text>

  <text x="275" y="605" text-anchor="middle" fill="#92400e" font-size="9">Union-Find でグループ化</text>

  <!-- バウンダリー詳細（左側サブセクション） -->
  <rect x="80" y="640" width="390" height="100" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="275" y="658" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">各レベルで実行</text>

  <rect x="95" y="668" width="170" height="28" rx="6" fill="url(#sub-amber)" filter="url(#shadow-sm)"/>
  <text x="180" y="687" text-anchor="middle" fill="white" font-size="10" font-weight="600">edge / core 分類</text>

  <rect x="285" y="668" width="170" height="28" rx="6" fill="url(#sub-amber)" filter="url(#shadow-sm)"/>
  <text x="370" y="687" text-anchor="middle" fill="white" font-size="10" font-weight="600">テンプレートノイズ</text>

  <rect x="95" y="702" width="170" height="28" rx="6" fill="url(#sub-amber)" filter="url(#shadow-sm)"/>
  <text x="180" y="721" text-anchor="middle" fill="white" font-size="10" font-weight="600">バイアス蓄積</text>

  <rect x="285" y="702" width="170" height="28" rx="6" fill="url(#sub-amber)" filter="url(#shadow-sm)"/>
  <text x="370" y="721" text-anchor="middle" fill="white" font-size="10" font-weight="600">横断的交差検出</text>

  <!-- 接続線: 合成記憶 → サブセクション -->
  <line x1="500" y1="598" x2="470" y2="575" stroke="#d1d5db" stroke-width="1"/>
  <!-- 接続線: バウンダリー → サブセクション -->
  <line x1="500" y1="653" x2="470" y2="668" stroke="#d1d5db" stroke-width="1"/>
  <line x1="500" y1="653" x2="470" y2="702" stroke="#d1d5db" stroke-width="1"/>

  <!-- 凡例 -->
  <text x="380" y="785" text-anchor="middle" fill="#9ca3af" font-size="10">─── データフロー ‐ ‐ ‐ 定期実行</text>
</svg>
